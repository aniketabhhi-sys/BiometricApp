name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch:        # allows manual trigger from GitHub UI

jobs:
  build-apk:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      # ── 1. Checkout ──────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Java 17 (required by React Native Gradle plugin) ──────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── 3. Node.js ───────────────────────────────────────────────────────
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # ── 4. Android SDK ───────────────────────────────────────────────────
      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Android SDK components
        run: |
          sdkmanager "platform-tools" \
                     "platforms;android-34" \
                     "build-tools;34.0.0" \
                     "ndk;25.2.9519653"

      # ── 5. Install JS dependencies ────────────────────────────────────────
      - name: Install npm dependencies
        run: npm install

      # ── 6. Cache Gradle ───────────────────────────────────────────────────
      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle*', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      # ── 7. Make gradlew executable ────────────────────────────────────────
      - name: Grant execute permission to gradlew
        run: chmod +x android/gradlew

      # ── 8. Build debug APK ────────────────────────────────────────────────
      - name: Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          ANDROID_HOME: ${{ env.ANDROID_HOME }}

      # ── 9. Upload APK as artifact ─────────────────────────────────────────
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: BiometricApp-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      # ── 10. Print download instructions ───────────────────────────────────
      - name: APK ready
        run: |
          echo "✅ APK built successfully!"
          echo "Go to: Actions → this workflow run → Artifacts → BiometricApp-debug"
          echo "Download and install on your Android phone."
